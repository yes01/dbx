<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preload" as="video" href="/assets/startup/donghua.mp4" type="video/mp4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestTeam DBX</title>
    <style>
      #preload-splash {
        position: fixed;
        inset: 0;
        z-index: 200000;
        background: #fff;
        transition: opacity 220ms ease-out;
      }

      #preload-splash.dismiss {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <script>
      window.__DBX_PRELOAD_START = Date.now();
      window.__DBX_PRELOAD_FALLBACK = window.setTimeout(() => {
        const preload = document.getElementById("preload-splash");
        if (!preload) return;
        preload.classList.add("dismiss");
        window.setTimeout(() => preload.remove(), 700);
      }, 4000);
    </script>

    <div id="preload-splash" aria-hidden="true"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
