<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestTeam DBX</title>
    <style>
      /* ── Preload splash: pure CSS, zero JS, lives OUTSIDE #root ── */
      #preload-splash {
        position: fixed;
        inset: 0;
        z-index: 200000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        animation: preload-enter 600ms cubic-bezier(0.22, 1, 0.36, 1) both;
        transition:
          opacity 550ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 550ms cubic-bezier(0.22, 1, 0.36, 1),
          filter 550ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      #preload-splash.dismiss {
        opacity: 0;
        transform: scale(1.06);
        filter: blur(12px);
        pointer-events: none;
      }
      @media (prefers-color-scheme: dark) {
        #preload-splash { background: #131416; }
      }

      .preload-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        animation: preload-panel-enter 700ms 100ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ── Liquid bars ── */
      .preload-bars {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 12px;
        height: 148px;
        padding: 12px 14px 8px;
      }
      .preload-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        width: 18px;
        height: 128px;
      }
      .preload-bar {
        width: 15px;
        border-radius: 999px;
        transform-origin: bottom center;
        animation: preload-rise 2.35s cubic-bezier(0.2, 0.9, 0.18, 1) infinite;
      }
      .preload-base {
        width: 8px;
        height: 8px;
        margin-top: 8px;
        border-radius: 999px;
        opacity: 0.72;
        animation: preload-base-pulse 2.35s ease-in-out infinite;
      }
      .preload-refl {
        width: 16px;
        height: 6px;
        margin-top: 2px;
        border-radius: 999px;
        filter: blur(4px);
        opacity: 0;
        animation: preload-refl-pulse 2.35s ease-in-out infinite;
      }

      /* Per-bar colors & delays */
      .preload-col:nth-child(1) { transform: translateX(-4px); }
      .preload-col:nth-child(1) .preload-bar { background: oklch(0.62 0.2 300); box-shadow: 0 0 18px oklch(0.66 0.24 300 / 48%); height: 67px; animation-delay: 0ms; }
      .preload-col:nth-child(1) .preload-base { background: oklch(0.62 0.2 300); animation-delay: 0ms; }
      .preload-col:nth-child(1) .preload-refl { background: oklch(0.62 0.2 300); animation-delay: 0ms; }

      .preload-col:nth-child(2) { transform: translateX(-2px); }
      .preload-col:nth-child(2) .preload-bar { background: oklch(0.61 0.19 255); box-shadow: 0 0 18px oklch(0.64 0.22 255 / 46%); height: 76px; animation-delay: 140ms; }
      .preload-col:nth-child(2) .preload-base { background: oklch(0.61 0.19 255); animation-delay: 140ms; }
      .preload-col:nth-child(2) .preload-refl { background: oklch(0.61 0.19 255); animation-delay: 140ms; }

      .preload-col:nth-child(3) { transform: translateX(1px); }
      .preload-col:nth-child(3) .preload-bar { background: oklch(0.68 0.15 215); box-shadow: 0 0 18px oklch(0.7 0.18 215 / 45%); height: 84px; animation-delay: 280ms; }
      .preload-col:nth-child(3) .preload-base { background: oklch(0.68 0.15 215); animation-delay: 280ms; }
      .preload-col:nth-child(3) .preload-refl { background: oklch(0.68 0.15 215); animation-delay: 280ms; }

      .preload-col:nth-child(4) { transform: translateX(3px); }
      .preload-col:nth-child(4) .preload-bar { background: oklch(0.72 0.15 165); box-shadow: 0 0 18px oklch(0.74 0.18 165 / 44%); height: 89px; animation-delay: 420ms; }
      .preload-col:nth-child(4) .preload-base { background: oklch(0.72 0.15 165); animation-delay: 420ms; }
      .preload-col:nth-child(4) .preload-refl { background: oklch(0.72 0.15 165); animation-delay: 420ms; }

      .preload-col:nth-child(5) { transform: translateX(2px); }
      .preload-col:nth-child(5) .preload-bar { background: oklch(0.78 0.16 112); box-shadow: 0 0 18px oklch(0.8 0.18 112 / 40%); height: 80px; animation-delay: 560ms; }
      .preload-col:nth-child(5) .preload-base { background: oklch(0.78 0.16 112); animation-delay: 560ms; }
      .preload-col:nth-child(5) .preload-refl { background: oklch(0.78 0.16 112); animation-delay: 560ms; }

      .preload-col:nth-child(6) { transform: translateX(-1px); }
      .preload-col:nth-child(6) .preload-bar { background: oklch(0.75 0.17 68); box-shadow: 0 0 18px oklch(0.78 0.19 68 / 42%); height: 72px; animation-delay: 700ms; }
      .preload-col:nth-child(6) .preload-base { background: oklch(0.75 0.17 68); animation-delay: 700ms; }
      .preload-col:nth-child(6) .preload-refl { background: oklch(0.75 0.17 68); animation-delay: 700ms; }

      .preload-col:nth-child(7) { transform: translateX(4px); }
      .preload-col:nth-child(7) .preload-bar { background: oklch(0.66 0.2 35); box-shadow: 0 0 18px oklch(0.7 0.23 35 / 44%); height: 64px; animation-delay: 840ms; }
      .preload-col:nth-child(7) .preload-base { background: oklch(0.66 0.2 35); animation-delay: 840ms; }
      .preload-col:nth-child(7) .preload-refl { background: oklch(0.66 0.2 35); animation-delay: 840ms; }

      /* ── Brand identity ── */
      .preload-copy {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      .preload-label {
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #a3a3a3;
      }
      .preload-hero {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.01em;
        line-height: 1.15;
        background: linear-gradient(135deg, oklch(0.62 0.2 300), oklch(0.61 0.19 255), oklch(0.68 0.15 215), oklch(0.72 0.15 165), oklch(0.78 0.16 112), oklch(0.75 0.17 68), oklch(0.66 0.2 35));
        background-size: 200% 200%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: preload-gradient-shift 4s ease-in-out infinite;
      }
      .preload-dots {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 10px;
      }
      .preload-dot {
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: #a3a3a3;
        opacity: 0.25;
        animation: preload-dot-pulse 1.4s ease-in-out infinite;
      }
      .preload-dot:nth-child(2) { animation-delay: 0.2s; }
      .preload-dot:nth-child(3) { animation-delay: 0.4s; }

      @media (prefers-color-scheme: dark) {
        .preload-label { color: #737378; }
        .preload-dot { background: #737378; }
      }

      /* ── Keyframes ── */
      @keyframes preload-rise {
        0%, 100% { transform: translateY(8px) scaleY(0.26); }
        30% { transform: translateY(-2px) scaleY(0.88); }
        44% { transform: translateY(-8px) scaleY(1); }
        58% { transform: translateY(1px) scaleY(0.58); }
        74% { transform: translateY(-3px) scaleY(0.76); }
      }
      @keyframes preload-base-pulse {
        0%, 100% { opacity: 0.5; transform: scale(0.72); }
        44% { opacity: 0.86; transform: scale(1.15); }
        64% { opacity: 0.62; transform: scale(0.88); }
      }
      @keyframes preload-refl-pulse {
        0%, 100% { opacity: 0.08; transform: scaleX(0.7); }
        44% { opacity: 0.32; transform: scaleX(1.3); }
        58% { opacity: 0.14; transform: scaleX(0.9); }
      }
      @keyframes preload-gradient-shift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      @keyframes preload-dot-pulse {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
        40% { opacity: 1; transform: scale(1.2); }
      }

      @keyframes preload-enter {
        from {
          opacity: 0;
          transform: scale(0.96);
          filter: blur(8px);
        }
        to {
          opacity: 1;
          transform: scale(1);
          filter: blur(0);
        }
      }
      @keyframes preload-panel-enter {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #preload-splash { transition: none; animation: none; }
        .preload-panel { animation: none; }
        .preload-bar { animation: none; transform: scaleY(0.72); }
        .preload-base { animation: none; }
        .preload-refl { animation: none; opacity: 0.18; }
        .preload-hero { animation: none; }
        .preload-dot { animation: none; opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <script>window.__DBX_PRELOAD_START = Date.now();</script>

    <!-- Preload splash: OUTSIDE #root so Vue mount doesn't destroy it -->
    <div id="preload-splash">
      <div class="preload-panel">
        <div class="preload-bars">
          <div class="preload-col"><div class="preload-bar"></div><div class="preload-base"></div><div class="preload-refl"></div></div>
          <div class="preload-col"><div class="preload-bar"></div><div class="preload-base"></div><div class="preload-refl"></div></div>
          <div class="preload-col"><div class="preload-bar"></div><div class="preload-base"></div><div class="preload-refl"></div></div>
          <div class="preload-col"><div class="preload-bar"></div><div class="preload-base"></div><div class="preload-refl"></div></div>
          <div class="preload-col"><div class="preload-bar"></div><div class="preload-base"></div><div class="preload-refl"></div></div>
          <div class="preload-col"><div class="preload-bar"></div><div class="preload-base"></div><div class="preload-refl"></div></div>
          <div class="preload-col"><div class="preload-bar"></div><div class="preload-base"></div><div class="preload-refl"></div></div>
        </div>
        <div class="preload-copy">
          <span class="preload-label">TestTeam</span>
          <span class="preload-hero">DBX</span>
          <div class="preload-dots">
            <span class="preload-dot"></span>
            <span class="preload-dot"></span>
            <span class="preload-dot"></span>
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
