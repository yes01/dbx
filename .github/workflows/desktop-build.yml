name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: dbx-windows-x64
            bundle_path: target/x86_64-pc-windows-msvc/release/bundle
            build_args: --ci --no-sign --config src-tauri/tauri.ci.conf.json --target x86_64-pc-windows-msvc
          - label: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: dbx-macos-arm64
            bundle_path: target/aarch64-apple-darwin/release/bundle
            build_args: --ci --config src-tauri/tauri.ci.conf.json --target aarch64-apple-darwin --bundles app

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            node scripts/set-app-version.mjs "${GITHUB_REF_NAME}"
          else
            node scripts/set-app-version.mjs "v0.6.0"
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'
          shared-key: desktop-build-${{ matrix.target }}
          cache-on-failure: true

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Build desktop bundle
        run: pnpm tauri build ${{ matrix.build_args }}

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/build-macos-dmg.mjs \
            "target/${{ matrix.target }}/release/bundle/macos/TestTeam DBX.app" \
            "target/${{ matrix.target }}/release/bundle/dmg/TestTeam.DBX_${VERSION}_aarch64.dmg"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error
          retention-days: 14
