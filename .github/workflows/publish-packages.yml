name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.3.10)'
        required: true

permissions:
  contents: write

env:
  APP_NAME: dbx
  PRODUCT_NAME: TestTeam DBX
  PRODUCT_ASSET_PREFIX: TestTeam.DBX
  REPO_OWNER: t8y2

jobs:
  publish:
    name: Publish to Homebrew & Scoop
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          TAG="$(echo "${TAG}" | xargs)"
          VERSION="${TAG#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Tag '${TAG}' does not look like a semver version."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          ASSETS=(
            "${PRODUCT_ASSET_PREFIX}_${VERSION}_aarch64.dmg"
            "${PRODUCT_ASSET_PREFIX}_${VERSION}_x64-setup.exe"
          )

          for ASSET in "${ASSETS[@]}"; do
            echo "::group::Downloading ${ASSET}"
            gh release download "${TAG}" \
              --repo "${{ github.repository }}" \
              --pattern "${ASSET}" \
              --dir artifacts \
              --clobber
            echo "::endgroup::"
          done

          ls -lh artifacts/

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          compute_hash() {
            local file="$1" name="$2"
            if [[ ! -f "${file}" ]]; then
              echo "::error::Missing artifact: ${file}"
              exit 1
            fi
            local hash
            hash=$(sha256sum "${file}" | cut -d ' ' -f 1)
            echo "${name}=${hash}" >> "$GITHUB_OUTPUT"
            echo "  ${name}: ${hash}"
          }

          echo "SHA256 hashes:"
          compute_hash "artifacts/${PRODUCT_ASSET_PREFIX}_${VERSION}_aarch64.dmg" "sha_dmg_arm64"
          compute_hash "artifacts/${PRODUCT_ASSET_PREFIX}_${VERSION}_x64-setup.exe" "sha_exe"

      - name: Check package publishing configuration
        id: publish-config
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [[ -z "${TAP_GITHUB_TOKEN}" ]]; then
            echo "::notice::TAP_GITHUB_TOKEN is not configured; skipping Homebrew and Scoop publishing."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Homebrew Cask
        if: steps.publish-config.outputs.enabled == 'true'
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_ARM64="${{ steps.hashes.outputs.sha_dmg_arm64 }}"

          git clone --depth 1 \
            "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${REPO_OWNER}/homebrew-tap.git" \
            homebrew-tap
          cd homebrew-tap
          mkdir -p Casks

          cat > Casks/dbx.rb <<'RUBY_EOF'
          cask "dbx" do
            version "__VERSION__"
            sha256 "__SHA_ARM64__"

            url "https://github.com/__OWNER__/__APP__/releases/download/v#{version}/__PRODUCT_ASSET___#{version}_aarch64.dmg",
                verified: "github.com/__OWNER__/__APP__/"
            name "TestTeam DBX"
            desc "Database management tool"
            homepage "https://dbxio.com/"

            depends_on macos: :big_sur
            depends_on arch: :arm64

            app "TestTeam DBX.app"

            zap trash: [
              "~/Library/Application Support/com.testteam.dbx",
              "~/Library/Caches/com.testteam.dbx",
              "~/Library/Logs/com.testteam.dbx",
              "~/Library/Preferences/com.testteam.dbx.plist",
            ]
          end
          RUBY_EOF

          sed -i 's/^          //' Casks/dbx.rb

          sed -i "s/__VERSION__/${VERSION}/g" Casks/dbx.rb
          sed -i "s/__OWNER__/${REPO_OWNER}/g" Casks/dbx.rb
          sed -i "s/__APP__/${APP_NAME}/g" Casks/dbx.rb
          sed -i "s/__PRODUCT_ASSET__/${PRODUCT_ASSET_PREFIX}/g" Casks/dbx.rb
          sed -i "s/__SHA_ARM64__/${SHA_ARM64}/g" Casks/dbx.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/dbx.rb

          if git diff --cached --quiet; then
            echo "Homebrew Cask is already up to date."
          else
            git commit -m "dbx ${VERSION}"
            git push
            echo "::notice::Homebrew Cask updated to ${VERSION}"
          fi

      - name: Publish Scoop manifest
        if: steps.publish-config.outputs.enabled == 'true'
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_EXE="${{ steps.hashes.outputs.sha_exe }}"

          git clone --depth 1 \
            "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${REPO_OWNER}/scoop-bucket.git" \
            scoop-bucket
          cd scoop-bucket

          cat > dbx.json <<JSON_EOF
          {
              "version": "${VERSION}",
              "description": "Open-source database management tool",
              "homepage": "https://github.com/${REPO_OWNER}/${APP_NAME}",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/${REPO_OWNER}/${APP_NAME}/releases/download/v${VERSION}/${PRODUCT_ASSET_PREFIX}_${VERSION}_x64-setup.exe",
                      "hash": "${SHA_EXE}"
                  }
              },
              "innosetup": false,
              "installer": {
                  "args": ["/S", "/D=\$dir"]
              },
              "uninstaller": {
                  "file": "uninstall.exe",
                  "args": ["/S"]
              },
              "checkver": {
                  "github": "https://github.com/${REPO_OWNER}/${APP_NAME}"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/${REPO_OWNER}/${APP_NAME}/releases/download/v\$version/${PRODUCT_ASSET_PREFIX}_\$version_x64-setup.exe"
                      }
                  }
              }
          }
          JSON_EOF

          sed -i 's/^          //' dbx.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dbx.json

          if git diff --cached --quiet; then
            echo "Scoop manifest is already up to date."
          else
            git commit -m "dbx ${VERSION}"
            git push
            echo "::notice::Scoop manifest updated to ${VERSION}"
          fi

  upload-r2:
    name: Upload to R2
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          TAG="$(echo "${TAG}" | xargs)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check R2 configuration
        id: r2-config
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [[ -z "${R2_ACCOUNT_ID}" || -z "${R2_BUCKET_NAME}" || -z "${R2_ACCESS_KEY_ID}" || -z "${R2_SECRET_ACCESS_KEY}" ]]; then
            echo "::notice::R2 secrets are not configured; skipping R2 upload."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets
        if: steps.r2-config.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir assets \
            --clobber
          ls -lh assets/

      - name: Upload to R2 (versioned)
        if: steps.r2-config.outputs.enabled == 'true'
        run: |
          aws s3 sync ./assets "s3://${R2_BUCKET_NAME}/releases/${{ steps.version.outputs.tag }}/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Upload to R2 (latest)
        if: steps.r2-config.outputs.enabled == 'true'
        run: |
          aws s3 sync ./assets "s3://${R2_BUCKET_NAME}/releases/latest/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

  promote-release:
    name: Promote to Release
    needs: [publish, upload-r2]
    runs-on: ubuntu-latest
    steps:
      - name: Promote prerelease to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          gh release edit "${TAG}" \
            --repo "${{ github.repository }}" \
            --prerelease=false \
            --latest
          echo "::notice::Release ${TAG} promoted from prerelease to latest release"

  notify-qq:
    name: QQ Notify
    needs: [promote-release]
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: msg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          RELEASE_JSON=$(gh release view "${TAG}" --repo "${{ github.repository }}" --json tagName,name,url,body)
          export RELEASE_TAG=$(echo "$RELEASE_JSON" | jq -r '.tagName')
          export RELEASE_URL=$(echo "$RELEASE_JSON" | jq -r '.url')
          export RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body')

          python3 - <<'PYEOF'
          import os, re

          tag = os.environ["RELEASE_TAG"]
          url = os.environ["RELEASE_URL"]
          body = os.environ.get("RELEASE_BODY", "")[:800]

          body = re.sub(r'#{1,6}\s*', '', body)
          body = re.sub(r'\*\*(.+?)\*\*', r'\1', body)
          body = re.sub(r'\*(.+?)\*', r'\1', body)
          body = re.sub(r'`(.+?)`', r'\1', body)
          body = re.sub(r'\[(.+?)\]\(.+?\)', r'\1', body)
          body = re.sub(r'\n{3,}', '\n\n', body)
          body = body.strip()

          msg = "\n".join([
              "━━━━━━━━━━━━━━━",
              f"🚀 新版本发布  {tag}",
              "━━━━━━━━━━━━━━━",
              "",
              body,
              "",
              f"下载: {url}",
              "━━━━━━━━━━━━━━━",
          ])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              delim = "EOF_MSG"
              f.write(f"msg<<{delim}\n{msg}\n{delim}\n")
          PYEOF

      - name: Send to QQ group
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          ASTRBOT_API_KEY: ${{ secrets.ASTRBOT_API_KEY }}
          MSG_CONTENT: ${{ steps.msg.outputs.msg }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          PAYLOAD=$(jq -nc --arg msg "$MSG_CONTENT" \
            '{"umo": "default:GroupMessage:1087880322", "message": $msg}')
          printf '%s' "$PAYLOAD" | ssh "root@${HOST}" "curl -fsS -X POST http://localhost:6185/api/v1/im/message \
            -H 'Authorization: Bearer ${ASTRBOT_API_KEY}' \
            -H 'Content-Type: application/json' \
            --data-binary @-"
