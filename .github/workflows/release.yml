name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v0.5.29'
        required: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            build_args: --ci --no-sign --config src-tauri/tauri.ci.conf.json --target x86_64-pc-windows-msvc
          - label: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            build_args: --ci --config src-tauri/tauri.ci.conf.json --target aarch64-apple-darwin --bundles app

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}.*$ ]]; then
            echo "::error::Release tag '$TAG' must start with v and a numeric version, for example v0.5.29."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version from release tag
        run: node scripts/set-app-version.mjs "${{ steps.release-tag.outputs.tag }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Generate release notes
        id: release-notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          BODY="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq '.body' 2>/dev/null || true)"
          if [ -z "$BODY" ]; then
            BODY="DBX ${TAG}"
          fi
          DELIM="RELEASE_NOTES_$(date +%s%N)"
          {
            echo "body<<$DELIM"
            printf '%s\n' "$BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release-tag.outputs.tag }}
          releaseName: 'DBX ${{ steps.release-tag.outputs.tag }}'
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.build_args }}

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          DMG_PATH="target/${{ matrix.target }}/release/bundle/dmg/TestTeam DBX_${VERSION}_aarch64.dmg"
          node scripts/build-macos-dmg.mjs \
            "target/${{ matrix.target }}/release/bundle/macos/TestTeam DBX.app" \
            "$DMG_PATH"
          gh release upload "${TAG}" "$DMG_PATH" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Upload Windows portable ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          $version = "${env:TAG}".TrimStart("v")
          $portableRoot = "portable"
          $portableDir = Join-Path $portableRoot "DBX_${version}_x64"
          $zipName = "DBX_${version}_x64-portable.zip"
          $exePath = "target/${{ matrix.target }}/release/dbx.exe"

          if (!(Test-Path $exePath)) {
            Write-Error "Missing Windows executable: $exePath"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exePath (Join-Path $portableDir "DBX.exe") -Force
          Copy-Item "LICENSE" (Join-Path $portableDir "LICENSE") -Force
          Copy-Item "README.md" (Join-Path $portableDir "README.md") -Force
          Set-Content -Path (Join-Path $portableDir "portable.dbx") -Value "" -NoNewline

          Compress-Archive -Path (Join-Path $portableDir "*") -DestinationPath $zipName -Force
          gh release upload "${env:TAG}" $zipName --repo "${env:GITHUB_REPOSITORY}" --clobber
