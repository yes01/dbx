name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v0.5.29'
        required: true
      prerelease:
        description: 'Publish as a prerelease when creating a new release'
        required: false
        type: boolean
        default: false
      force_rebuild:
        description: 'Rebuild a release that already has latest.json'
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare draft release
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.prepare.outputs.tag }}
      sha: ${{ steps.prepare.outputs.sha }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
      skip: ${{ steps.prepare.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}
          fetch-depth: 0

      - name: Validate tag, source checks, and release state
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$RELEASE_TAG"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag '$TAG' must start with v and a numeric version, for example v0.5.29."
            exit 1
          fi

          TAG_SHA="$(git rev-list -n 1 "$TAG")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ -z "$TAG_SHA" ] || [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "::error::Checked out commit '$HEAD_SHA' does not match release tag '$TAG' ('$TAG_SHA')."
            exit 1
          fi

          RELEASE_JSON="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,assets 2>/dev/null || true)"
          if [ -n "$RELEASE_JSON" ]; then
            HAS_MANIFEST="$(printf '%s' "$RELEASE_JSON" | jq -r 'any(.assets[]?; .name == "latest.json")')"
            PRERELEASE="$(printf '%s' "$RELEASE_JSON" | jq -r '.isPrerelease')"
          else
            HAS_MANIFEST="false"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              PRERELEASE="${INPUT_PRERELEASE:-false}"
            else
              PRERELEASE="${{ github.event.release.prerelease }}"
            fi
          fi

          if [ "$HAS_MANIFEST" = "true" ] && [ "$FORCE_REBUILD" != "true" ]; then
            echo "::notice::Release $TAG already contains latest.json; skipping duplicate published event."
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
            echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing_checks=()
          for workflow in ci.yml desktop-build.yml; do
            successful_run="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --commit "$TAG_SHA" --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
            if [ -z "$successful_run" ]; then
              missing_checks+=("$workflow")
            fi
          done

          if [ "${#missing_checks[@]}" -gt 0 ]; then
            if [ -n "$RELEASE_JSON" ]; then
              gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=true --prerelease="$PRERELEASE"
            fi
            echo "::error::Release source $TAG_SHA is missing successful checks: ${missing_checks[*]}."
            exit 1
          fi

          if [ -z "$RELEASE_JSON" ]; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --draft --title "DBX $TAG"
          else
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=true --prerelease="$PRERELEASE"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare-release
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            build_args: --ci --config src-tauri/tauri.release.conf.json --target x86_64-pc-windows-msvc
          - label: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            build_args: --ci --config src-tauri/tauri.release.conf.json --target aarch64-apple-darwin --bundles app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version from release tag
        run: node scripts/set-app-version.mjs "${{ needs.prepare-release.outputs.tag }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Resolve release notes
        id: release-notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BODY="$(gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body' 2>/dev/null || true)"
          else
            BODY="${RELEASE_BODY:-}"
          fi
          DELIM="RELEASE_NOTES_$(date +%s%N)"
          {
            echo "body<<$DELIM"
            printf '%s\n' "$BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: 'DBX ${{ needs.prepare-release.outputs.tag }}'
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseCommitish: ${{ needs.prepare-release.outputs.sha }}
          releaseDraft: true
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          args: ${{ matrix.build_args }}

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          DMG_PATH="target/${{ matrix.target }}/release/bundle/dmg/TestTeam.DBX_${VERSION}_aarch64.dmg"
          node scripts/build-macos-dmg.mjs \
            "target/${{ matrix.target }}/release/bundle/macos/TestTeam DBX.app" \
            "$DMG_PATH"
          gh release upload "${TAG}" "$DMG_PATH" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Upload Windows portable ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          $version = "${env:TAG}".TrimStart("v")
          $portableRoot = "portable"
          $portableDir = Join-Path $portableRoot "DBX_${version}_x64"
          $zipName = "DBX_${version}_x64-portable.zip"
          $exePath = "target/${{ matrix.target }}/release/dbx.exe"

          if (!(Test-Path $exePath)) {
            Write-Error "Missing Windows executable: $exePath"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exePath (Join-Path $portableDir "DBX.exe") -Force
          Copy-Item "LICENSE" (Join-Path $portableDir "LICENSE") -Force
          Copy-Item "README.md" (Join-Path $portableDir "README.md") -Force
          Set-Content -Path (Join-Path $portableDir "portable.dbx") -Value "" -NoNewline

          Compress-Archive -Path (Join-Path $portableDir "*") -DestinationPath $zipName -Force
          gh release upload "${env:TAG}" $zipName --repo "${env:GITHUB_REPOSITORY}" --clobber

  finalize-updater-manifest:
    name: Finalize updater manifest
    runs-on: ubuntu-22.04
    needs: [prepare-release, build]
    if: needs.prepare-release.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package JDBC plugin
        id: jdbc-plugin
        shell: bash
        run: |
          ./plugins/jdbc/package.sh
          VERSION="$(node -p "require('./plugins/jdbc/manifest.json').version")"
          PROTOCOL_VERSION="$(node -p "require('./plugins/jdbc/manifest.json').protocol_version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "protocol_version=$PROTOCOL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload JDBC plugin assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          JDBC_VERSION: ${{ steps.jdbc-plugin.outputs.version }}
        run: |
          gh release upload "$TAG" \
            "plugins/jdbc/dist/dbx-jdbc-plugin-${JDBC_VERSION}.zip" \
            "plugins/jdbc/dist/dbx-jdbc-plugin-latest.zip" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Sync JDBC plugin assets to R2 when configured
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          JDBC_VERSION: ${{ steps.jdbc-plugin.outputs.version }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_BUCKET_NAME" ] || [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::notice::R2 release secrets are not fully configured; skipping optional JDBC mirror sync."
            exit 0
          fi

          pip install awscli --quiet
          VERSIONED_ASSET="plugins/jdbc/dist/dbx-jdbc-plugin-${JDBC_VERSION}.zip"
          LATEST_ASSET="plugins/jdbc/dist/dbx-jdbc-plugin-latest.zip"
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          VERSIONED_KEY="releases/jdbc/${JDBC_VERSION}/dbx-jdbc-plugin-${JDBC_VERSION}.zip"
          LATEST_KEY="releases/latest/dbx-jdbc-plugin-latest.zip"

          aws s3 cp "$VERSIONED_ASSET" "s3://${R2_BUCKET_NAME}/${VERSIONED_KEY}" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/zip
          aws s3 cp "$LATEST_ASSET" "s3://${R2_BUCKET_NAME}/${LATEST_KEY}" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/zip \
            --cache-control 'no-cache'

          LOCAL_SHA="$(sha256sum "$VERSIONED_ASSET" | cut -d ' ' -f 1)"
          verify_mirror() {
            local url="$1"
            local remote_sha=""
            for attempt in $(seq 1 12); do
              remote_sha="$(curl --fail --silent --show-error --location "$url" | sha256sum | cut -d ' ' -f 1)" || true
              if [ "$remote_sha" = "$LOCAL_SHA" ]; then
                echo "Verified $url ($LOCAL_SHA)"
                return 0
              fi
              echo "Mirror verification attempt $attempt failed for $url: expected $LOCAL_SHA, got ${remote_sha:-download-error}"
              sleep 5
            done
            return 1
          }

          verify_mirror "https://dl.dbxio.com/${VERSIONED_KEY}"
          verify_mirror "https://dl.dbxio.com/${LATEST_KEY}?v=${JDBC_VERSION}"

      - name: Resolve release notes
        id: release-notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BODY="$(gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body' 2>/dev/null || true)"
          else
            BODY="${RELEASE_BODY:-}"
          fi
          NOTES_PATH="${RUNNER_TEMP}/release-notes.md"
          printf '%s' "$BODY" > "$NOTES_PATH"
          echo "path=$NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Apply release notes to latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          NOTES_PATH: ${{ steps.release-notes.outputs.path }}
        run: |
          WORK_DIR="${RUNNER_TEMP}/latest-json"
          mkdir -p "$WORK_DIR"
          gh release download "$TAG" --repo "${GITHUB_REPOSITORY}" --pattern latest.json --dir "$WORK_DIR"
          node .github/scripts/apply-release-notes-to-latest-json.mjs "$WORK_DIR/latest.json" "$NOTES_PATH"
          node .github/scripts/augment-latest-json-jdbc-plugin.mjs \
            "$WORK_DIR/latest.json" \
            "${{ steps.jdbc-plugin.outputs.version }}" \
            "${{ steps.jdbc-plugin.outputs.protocol_version }}" \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/dbx-jdbc-plugin-${{ steps.jdbc-plugin.outputs.version }}.zip"
          gh release upload "$TAG" "$WORK_DIR/latest.json" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish completed release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: |
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --prerelease="$PRERELEASE"
